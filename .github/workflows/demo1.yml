name: Practice Event 1

on:
  push:
    branches:
      - master
      - "dev-*"
    paths-ignore:
      - ".github/workflows/*"
  pull_request:
    branches:
      - master
      - "dev-*"
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: get the code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install depedencies
        run: npm install
      - name: Run test
        run: npm test
  Lint-check:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: get code
        uses: actions/checkout@v4
      - name: install node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: install depedencies
        run: npm install
      - name: run lint
        run: npm run lint

  BuildProject:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
  deploy:
    needs: [test, BuildProject]
    runs-on: ubuntu-latest
    steps:
      - name: get the code
        uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Deploying project
        run: echo "the project is deploying"
